text
cdrom

%addon com_redhat_kdump --disable

%end

# Keyboard layouts
keyboard --xlayouts='us'
# System language
lang en_US.UTF-8

# Network information (dual-stack)
# Note: IPv6 configured without default gateway - local subnet only, internet uses IPv4
network --bootproto=static --ip=get_ipv4_address --netmask=get_ipv4_netmask --gateway=get_ipv4_gateway --ipv6=get_ipv6_address/get_ipv6_prefix --nameserver=8.8.8.8,1.1.1.1 --device=link --onboot=on --hostname=get_infra_server_name --activate

%packages
@^minimal-environment
bash-completion
vim
git
bind-utils
bind
wget
tar
cifs-utils
tftp-server
kea
kea-hooks
radvd
nginx
nginx-mod-stream
openssl
tmux
rsync
sysstat
tcpdump
traceroute
nc
samba-client
lsof
nfs-utils
nmap
tuned
tree
yum-utils
python3-cryptography
cloud-utils-growpart
squashfs-tools
createrepo_c
-kdump-utils
-lvm2
%end

# Run the Setup Agent on first boot
firstboot --disable

# File System Creation
ignoredisk --only-use=vda
clearpart --all --initlabel
bootloader --location=mbr --boot-drive=vda
part /boot/efi --label=FIRMWARE --size=128  --fstype=efi
part /boot     --label=BOOT     --size=1024 --fstype=xfs
part /         --label=ROOT     --size=1024 --grow --fstype=xfs

# System timezone
timezone UTC --utc
timesource --ntp-pool time.google.com

# Enable service
services --enabled=tuned

# Disable SELinux
selinux --disabled

# Disable Firewall
firewall --disabled

# Root password
rootpw --iscrypted get_shadow_password_super_mgmt_user
user --groups=wheel --name=get_mgmt_super_user --password=get_shadow_password_super_mgmt_user --iscrypted --gecos="get_mgmt_super_user"

eula --agreed

# POST-INSTALLATION SCRIPT
%post --interpreter=/usr/bin/bash --log=/root/original-ks-post.log --erroronfail

/usr/bin/echo -e "HISTSIZE=-1\nHISTFILESIZE=-1" >>/root/.bashrc
/usr/bin/echo -e "HISTSIZE=-1\nHISTFILESIZE=-1" >>/home/get_mgmt_super_user/.bashrc

/usr/bin/echo "get_mgmt_super_user ALL=(ALL) NOPASSWD:ALL" >/etc/sudoers.d/get_mgmt_super_user

############### Start Reconfigure-Network-with-Network-Manager ##############

mkdir -p /root/system-connections/orig-during-install

/bin/rsync -avPh /etc/NetworkManager/system-connections/* /root/system-connections/orig-during-install/

v_count=0
for v_interface_file in /etc/NetworkManager/system-connections/*
do
        v_basename=$(/bin/basename "$v_interface_file")
        /bin/mv "$v_interface_file" /etc/NetworkManager/system-connections/eth${v_count}.nmconnection
        v_interface=$(/bin/echo "$v_basename" | /bin/cut -d "." -f 1)
        /bin/sed -i "s/$v_interface/eth$v_count/g" /etc/NetworkManager/system-connections/eth${v_count}.nmconnection
        v_count=$((v_count+1))
done

/bin/mv /etc/NetworkManager/system-connections/eth* /root/system-connections

/bin/rm -rf /etc/NetworkManager/system-connections/*

/bin/rsync -avPh /root/system-connections/* /etc/NetworkManager/system-connections/.

/bin/rm -rf /etc/NetworkManager/system-connections/orig-during-install

/bin/mkdir -p /etc/systemd/network

V_count=0
for v_interface in $(/bin/ls /sys/class/net | /bin/grep -v lo)
do
        /bin/echo -e "[Match]\nMACAddress=$(/sbin/ip link show "$v_interface" | /bin/grep link/ether | /bin/awk '{print $2}')\n\n[Link]\nName=eth$V_count" >/etc/systemd/network/7${V_count}-eth${V_count}.link
        V_count=$((V_count+1))
done

############### End Reconfigure-Network-with-Network-Manager ##############

# Disable IPv6 DAD (Duplicate Address Detection) — ULA addresses in a controlled
# lab have zero collision risk, and DAD causes services to fail binding on boot
/usr/bin/cat << EOF > /etc/sysctl.d/99-tux2lab-no-ipv6-dad.conf
net.ipv6.conf.eth0.accept_dad = 0
net.ipv6.conf.eth0.dad_transmits = 0
EOF

# Mask NetworkManager-wait-online — static config, no need to wait
/usr/bin/systemctl mask NetworkManager-wait-online.service

/bin/mkdir -p /home/get_mgmt_super_user/.ssh /root/.ssh

/bin/echo 'get_ssh_public_key_of_qemu_host_machine' > /home/get_mgmt_super_user/.ssh/authorized_keys

/bin/echo 'get_ssh_private_key_of_qemu_host_machine' > /home/get_mgmt_super_user/.ssh/tux2lab_id_rsa

/bin/echo 'get_ssh_public_key_of_qemu_host_machine' > /home/get_mgmt_super_user/.ssh/tux2lab_id_rsa.pub

/bin/echo 'get_ssh_public_key_of_qemu_host_machine' > /root/.ssh/authorized_keys

/bin/echo 'get_ssh_private_key_of_qemu_host_machine' > /root/.ssh/tux2lab_id_rsa

/bin/echo 'get_ssh_public_key_of_qemu_host_machine' > /root/.ssh/tux2lab_id_rsa.pub

/bin/chmod 0700 /home/get_mgmt_super_user/.ssh /root/.ssh

/bin/chmod 0600 /home/get_mgmt_super_user/.ssh/authorized_keys /root/.ssh/authorized_keys

/bin/chmod 0600 /home/get_mgmt_super_user/.ssh/tux2lab_id_rsa /root/.ssh/tux2lab_id_rsa

/bin/chmod 0644 /home/get_mgmt_super_user/.ssh/tux2lab_id_rsa.pub /root/.ssh/tux2lab_id_rsa.pub

/bin/chown -R get_mgmt_super_user:get_mgmt_super_user /home/get_mgmt_super_user/.ssh 

/bin/echo 'get_lab_infra_domain_name' > /root/infra_server_on_qemu_kvm_dnsbinder_domain_provided

/bin/mkdir -p /etc/ssh/ssh_config.d

/usr/bin/cat << EOF > /etc/ssh/ssh_config.d/999-tux2lab.conf
Host *.get_lab_infra_domain_name get_subnets_to_allow_ssh_pub_access
  IdentityFile ~/.ssh/tux2lab_id_rsa
  StrictHostKeyChecking no
  UserKnownHostsFile /dev/null
  LogLevel QUIET
EOF

/usr/bin/systemctl mask dnf-makecache.timer dnf-makecache.service

# Remove subscription-manager on RHEL (not needed with local ISO repo)
if [[ "get_infra_server_distro" == "rhel" ]]; then
    /usr/bin/dnf remove -y rhc subscription-manager || true
fi

# Store infra server distro and version as environment variables
/bin/echo "infra_server_distro=\"get_infra_server_distro\"" >> /etc/environment
/bin/echo "infra_server_version=\"get_infra_server_version\"" >> /etc/environment

# Mount infra server ISO and configure local file-based repo
# (same pattern as guest VMs — no internet repos needed)
iso_mount_path="/tux2lab-data/os-repos/get_infra_server_distro/get_infra_server_version"
/bin/mkdir -p "${iso_mount_path}"
/bin/mount -o ro /dev/sr0 "${iso_mount_path}"
/bin/echo "/dev/sr0  ${iso_mount_path}  iso9660  ro,nofail  0 0" >> /etc/fstab

# Backup original repo files and create local repo
/bin/mkdir -p /etc/yum.repos.d/original
/bin/mv /etc/yum.repos.d/*.repo /etc/yum.repos.d/original/ 2>/dev/null || true
/usr/bin/cat << REPOEOF > /etc/yum.repos.d/tux2lab-local.repo
[tux2lab-local-baseos]
name=tux2lab Local ISO - BaseOS
baseurl=file://${iso_mount_path}/BaseOS
enabled=1
gpgcheck=0

[tux2lab-local-appstream]
name=tux2lab Local ISO - AppStream
baseurl=file://${iso_mount_path}/AppStream
enabled=1
gpgcheck=0
REPOEOF

# Create /tux2lab directory for host to rsync into
/bin/mkdir -p /tux2lab
/bin/chown get_mgmt_super_user:get_mgmt_super_user /tux2lab

# Enable TFTP service
/usr/bin/systemctl enable tftp.socket

/usr/bin/date '+%Y-%m-%d %H:%M:%S %Z' > /etc/bigbang

%end

reboot

############## EOF #############
