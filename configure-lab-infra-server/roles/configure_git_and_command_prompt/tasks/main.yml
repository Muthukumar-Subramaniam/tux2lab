---
# tasks file for configure_git_and_command_prompt
- name: Download git-prompt.sh for root
  become: true
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/git/git/master/contrib/completion/git-prompt.sh
    dest: /root/.git-prompt.sh

- name: Download git-prompt.sh for {{ ansible_facts.env.mgmt_super_user }}
  become: true
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/git/git/master/contrib/completion/git-prompt.sh
    dest: "/home/{{ ansible_facts.env.mgmt_super_user }}/.git-prompt.sh"
    owner: "{{ ansible_facts.env.mgmt_super_user }}"
    group: "{{ ansible_facts.env.mgmt_super_user }}"
    mode: '0644'

- name: Append source command for git-prompt.sh in .bashrc of root and {{ ansible_facts.env.mgmt_super_user }}
  become: true
  ansible.builtin.lineinfile:
    path: "{{ item }}"
    line: 'source ~/.git-prompt.sh'
    state: present
    backup: true
  loop:
    - "/root/.bashrc"
    - "/home/{{ ansible_facts.env.mgmt_super_user }}/.bashrc"

- name: Update PS1 variable in .bashrc for {{ ansible_facts.env.mgmt_super_user }} user
  become: true
  ansible.builtin.lineinfile:
    path: "/home/{{ ansible_facts.env.mgmt_super_user }}/.bashrc"
    line: "{{ ps1_variable_mgmt_user }}"
    regexp: '^PS1='
    state: present

- name: Update PS1 variable in .bashrc for root user
  become: true
  ansible.builtin.lineinfile:
    path: "/root/.bashrc"
    line: "{{ ps1_variable_root_user }}"
    regexp: '^PS1='
    state: present

########################### EOF #########################
