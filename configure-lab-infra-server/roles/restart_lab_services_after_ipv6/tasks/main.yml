---
# tasks file for restart_lab_services_after_ipv6
#
# Host mode: Deploy tux2lab-lab-infra.service that runs start.sh
#            Disable libvirtd (tux2lab start controls it)
# VM mode:   Deploy lab-services-restart.service (IPv6 DAD wait + restart)

# ====== Determine if running in host mode ======
- name: Check if lab_environment_vars exists
  ansible.builtin.stat:
    path: /tux2lab-data/lab_environment_vars
  register: lab_env_vars_file

- name: Read lab_infra_server_mode_is_host from lab_environment_vars
  ansible.builtin.shell: |
    grep -q '^lab_infra_server_mode_is_host=true' /tux2lab-data/lab_environment_vars && echo true || echo false
  register: host_mode_check
  changed_when: false
  when: lab_env_vars_file.stat.exists

- name: Set host mode fact
  ansible.builtin.set_fact:
    is_host_mode: "{{ (lab_env_vars_file.stat.exists and host_mode_check.stdout | default('false') == 'true') | bool }}"

# ====== HOST MODE: tux2lab-lab-infra.service ======

- name: Read lab_infra_admin_username from lab_environment_vars
  ansible.builtin.shell: |
    grep '^lab_infra_admin_username=' /tux2lab-data/lab_environment_vars | cut -d= -f2 | tr -d '"'
  register: admin_username_result
  changed_when: false
  when: is_host_mode

- name: Remove old lab-services-restart.service (host mode)
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/systemd/system/lab-services-restart.service
    - /usr/local/bin/wait-for-ipv6.sh
  when: is_host_mode

- name: Disable libvirtd and its sockets (host mode)
  become: true
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    enabled: false
  loop:
    - libvirtd.service
    - libvirtd.socket
    - libvirtd-ro.socket
    - libvirtd-admin.socket
  when: is_host_mode

- name: Create tux2lab-lab-infra.service (host mode)
  become: true
  ansible.builtin.copy:
    dest: /etc/systemd/system/tux2lab-lab-infra.service
    content: |
      [Unit]
      Description=tux2lab Lab Infrastructure
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      User={{ admin_username_result.stdout }}
      ExecStart=/tux2lab/qemu-kvm-manage/scripts-to-manage-vms/start.sh

      [Install]
      WantedBy=multi-user.target
    mode: '0644'
    owner: root
    group: root
  when: is_host_mode

- name: Reload systemd daemon (host mode)
  become: true
  ansible.builtin.systemd:
    daemon_reload: true
  when: is_host_mode

- name: Enable tux2lab-lab-infra.service (host mode)
  become: true
  ansible.builtin.systemd_service:
    name: tux2lab-lab-infra.service
    enabled: true
  when: is_host_mode

# ====== VM MODE: lab-services-restart.service ======

- name: Create IPv6 wait script (VM mode)
  become: true
  ansible.builtin.copy:
    dest: /usr/local/bin/wait-for-ipv6.sh
    content: |
      #!/usr/bin/env bash
      # Wait for IPv6 address to be configured and stable
      MAX_WAIT=60
      COUNTER=0
      IPV6_ADDRESS="{{ ansible_facts.env.dnsbinder_server_ipv6_address }}"
      MGMT_IFACE="{{ ansible_facts.env.mgmt_interface_name }}"
      IPV6_PREFIX="{{ ansible_facts.env.dnsbinder_ipv6_prefix }}"
      
      echo "Waiting for IPv6 address ${IPV6_ADDRESS} to be ready on ${MGMT_IFACE}..."
      
      while [[ $COUNTER -lt $MAX_WAIT ]]; do
        # Check if IPv6 address exists and is not tentative
        if ip -6 addr show "${MGMT_IFACE}" | grep -q "inet6 ${IPV6_ADDRESS}/${IPV6_PREFIX} scope global" && \
           ! ip -6 addr show "${MGMT_IFACE}" | grep "${IPV6_ADDRESS}" | grep -q "tentative"; then
          echo "IPv6 address is configured and stable"
          # Additional 2 second grace period
          sleep 2
          exit 0
        fi
        sleep 0.5
        COUNTER=$((COUNTER + 1))
      done
      
      echo "Timeout waiting for IPv6 address"
      exit 1
    mode: '0755'
    owner: root
    group: root
  when: not is_host_mode

- name: Create lab-services-restart.service (VM mode)
  become: true
  ansible.builtin.copy:
    dest: /etc/systemd/system/lab-services-restart.service
    content: |
      [Unit]
      Description=Restart Lab Services After IPv6 is Ready
      After=network-online.target NetworkManager.service
      Wants=network-online.target
      
      [Service]
      Type=oneshot
      RemainAfterExit=yes
      ExecStart=/usr/local/bin/wait-for-ipv6.sh
      ExecStart=/usr/bin/systemctl restart nginx.service nfs-server.service kea-dhcp6.service radvd.service chronyd.service named.service
      
      [Install]
      WantedBy=multi-user.target
    mode: '0644'
    owner: root
    group: root
  when: not is_host_mode

- name: Reload systemd daemon (VM mode)
  become: true
  ansible.builtin.systemd:
    daemon_reload: true
  when: not is_host_mode

- name: Enable lab-services-restart.service (VM mode)
  become: true
  ansible.builtin.systemd_service:
    name: lab-services-restart.service
    enabled: true
  when: not is_host_mode

############################# EOF ##############################
