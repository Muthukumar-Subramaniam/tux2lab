---
# tasks file for restart_lab_services_after_ipv6
#
# VM mode (Ansible runs inside the infra VM):
#   Deploy tux2lab-ipv6-rebind.service (IPv6 DAD wait + restart all services)
#
# Host mode: No action needed here.
#   tux2lab-lab-infra.service is deployed by deploy-lab-infra-server.sh
#
# NOTE: is_host_mode fact is set by setup_global_vars role

# ====== VM MODE: tux2lab-ipv6-rebind.service (inside infra VM) ======

- name: Remove old lab-services-restart.service (VM mode)
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/systemd/system/lab-services-restart.service
    - /usr/local/bin/wait-for-ipv6.sh
  when: not is_host_mode

- name: Create tux2lab-ipv6-rebind.service (VM mode)
  become: true
  ansible.builtin.copy:
    dest: /etc/systemd/system/tux2lab-ipv6-rebind.service
    content: |
      [Unit]
      Description=tux2lab IPv6 Service Rebind
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      ExecStartPre=/bin/bash -c ' \
        IFACE="{{ ansible_facts.env.mgmt_interface_name }}"; \
        ADDR="{{ ansible_facts.env.dnsbinder_server_ipv6_address }}"; \
        for i in $(seq 1 60); do \
          if ip -6 addr show dev "$IFACE" 2>/dev/null \
             | grep -q "inet6 $ADDR/.* scope global" \
          && ! ip -6 addr show dev "$IFACE" 2>/dev/null \
             | grep "$ADDR" | grep -q tentative; then \
            sleep 2; exit 0; \
          fi; \
          sleep 1; \
        done; \
        echo "Timeout: IPv6 address $ADDR not ready on $IFACE after 60s"; \
        exit 1'
      ExecStart=/usr/bin/systemctl restart named.service
      ExecStart=/usr/bin/systemctl restart kea-dhcp4.service kea-dhcp6.service kea-ctrl-agent.service
      ExecStart=/usr/bin/systemctl restart radvd.service
      ExecStart=/usr/bin/systemctl restart tftp.socket
      ExecStart=/usr/bin/systemctl restart nginx.service
      ExecStart=/usr/bin/systemctl restart nfs-server.service
      ExecStart=/usr/bin/systemctl restart chronyd.service

      [Install]
      WantedBy=multi-user.target
    mode: '0644'
    owner: root
    group: root
  when: not is_host_mode

- name: Reload systemd daemon (VM mode)
  become: true
  ansible.builtin.systemd:
    daemon_reload: true
  when: not is_host_mode

- name: Enable tux2lab-ipv6-rebind.service (VM mode)
  become: true
  ansible.builtin.systemd_service:
    name: tux2lab-ipv6-rebind.service
    enabled: true
  when: not is_host_mode

############################# EOF ##############################
