---
# tasks file for setup_pxe_boot_of_server

- name: Detect Kea socket directory
  become: true
  ansible.builtin.shell:
    cmd: |
      kea_dir=$(systemctl show kea-dhcp4.service -p Environment 2>/dev/null \
        | grep -oP 'KEA_CONTROL_SOCKET_DIR=\K[^ "]+')
      if [[ -n "$kea_dir" ]]; then
        echo "$kea_dir"
      else
        test_cfg=$(mktemp)
        echo '{"Dhcp4":{"control-socket":{"socket-type":"unix","socket-name":"/run/kea/test"}}}' > "$test_cfg"
        test_output=$(kea-dhcp4 -t "$test_cfg" 2>&1)
        rm -f "$test_cfg"
        if echo "$test_output" | grep -qP "supported path is '"; then
          echo "$test_output" | grep -oP "supported path is '\K[^']+" | head -1
        else
          echo "/run/kea"
        fi
      fi
  register: kea_socket_dir_result
  changed_when: false

- name: Set Kea socket directory fact
  ansible.builtin.set_fact:
    kea_run_dir: "{{ kea_socket_dir_result.stdout }}"

- name: Generate random password for Kea Control Agent
  ansible.builtin.set_fact:
    kea_ctrl_agent_password: "{{ lookup('ansible.builtin.password', '/dev/null length=32 chars=ascii_letters,digits') }}"

- name: Configure /etc/kea/kea-dhcp4.conf
  become: true
  ansible.builtin.template:
    src: kea_dhcp4_conf.j2
    dest: /etc/kea/kea-dhcp4.conf

- name: Restart kea-dhcp4
  become: true
  ansible.builtin.systemd_service:
    name: kea-dhcp4
    state: restarted
    enabled: true

- name: Configure /etc/kea/kea-dhcp6.conf
  become: true
  ansible.builtin.template:
    src: kea_dhcp6_conf.j2
    dest: /etc/kea/kea-dhcp6.conf

- name: Restart kea-dhcp6
  become: true
  ansible.builtin.systemd_service:
    name: kea-dhcp6
    state: restarted
    enabled: true

- name: Configure /etc/kea/kea-ctrl-agent.conf
  become: true
  ansible.builtin.template:
    src: kea_ctrl_agent_conf.j2
    dest: /etc/kea/kea-ctrl-agent.conf

- name: Restart kea-ctrl-agent
  become: true
  ansible.builtin.systemd_service:
    name: kea-ctrl-agent
    state: restarted
    enabled: true

- name: Configure /etc/radvd.conf for IPv6 Router Advertisements
  become: true
  ansible.builtin.template:
    src: radvd_conf.j2
    dest: /etc/radvd.conf

- name: Restart radvd
  become: true
  ansible.builtin.systemd_service:
    name: radvd
    state: restarted
    enabled: true

- name: Enable IPv6 forwarding for radvd
  become: true
  ansible.posix.sysctl:
    name: net.ipv6.conf.all.forwarding
    value: '1'
    state: present
    sysctl_file: /etc/sysctl.d/99-ipv6-forwarding.conf
    sysctl_set: true
    reload: true

- name: Create tux2lab bind-mount point under /tux2lab-data
  become: true
  ansible.builtin.file:
    path: "/tux2lab-data/tux2lab"
    state: directory

- name: Unmount stale bind mount at /tux2lab-data/tux2lab if present
  become: true
  ansible.builtin.command:
    cmd: umount /tux2lab-data/tux2lab
  register: tux2lab_umount
  changed_when: tux2lab_umount.rc == 0
  failed_when: false

- name: Bind mount /tux2lab as /tux2lab-data/tux2lab and update fstab
  become: true
  ansible.posix.mount:
    path: "/tux2lab-data/tux2lab"
    src: "/tux2lab"
    fstype: none
    opts: "bind,ro"
    state: mounted

- name: Create /tux2lab-data/ipxe to manage iPXE
  become: true
  ansible.builtin.file:
    path: "/tux2lab-data/ipxe"
    state: directory
    owner: "{{ ansible_facts.env.mgmt_super_user }}"
    group: "{{ ansible_facts.env.mgmt_super_user }}"

- name: Deploy ipxe.efi for HTTP boot
  become: true
  ansible.builtin.copy:
    src: ipxe.efi
    dest: "/tux2lab-data/ipxe/ipxe.efi"
    mode: '0644'

- name: Deploy ipxe.efi to TFTP directory for PXE boot
  become: true
  ansible.builtin.copy:
    src: ipxe.efi
    dest: "/var/lib/tftpboot/ipxe.efi"
    mode: '0644'

- name: Enable and Start tftp.socket
  become: true
  ansible.builtin.systemd_service:
    name: tftp.socket
    state: started
    enabled: true

- name: Enable and Start kea-dhcp4,kea-dhcp6,kea-ctrl-agent,radvd
  become: true
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    state: started
    enabled: true
  loop:
    - "kea-dhcp4"
    - "kea-dhcp6"
    - "kea-ctrl-agent"
    - "radvd"

- name: Create command sym-link dnsbinder
  become: true
  ansible.builtin.file:
    src: /tux2lab/named-manage/dnsbinder.sh
    dest: /usr/sbin/dnsbinder
    state: link

- name: Set execute permissions on ksmanager.sh
  become: true
  ansible.builtin.file:
    path: /tux2lab/ks-manage/ksmanager.sh
    mode: '0755'

- name: Create command sym-link ksmanager
  become: true
  ansible.builtin.file:
    src: /tux2lab/ks-manage/ksmanager.sh
    dest: /usr/local/bin/ksmanager
    state: link

- name: Set execute permissions on prepare-distro-for-ksmanager.sh
  become: true
  ansible.builtin.file:
    path: /tux2lab/ks-manage/prepare-distro-for-ksmanager.sh
    mode: '0755'

- name: Create command sym-link prepare-distro-for-ksmanager
  become: true
  ansible.builtin.file:
    src: /tux2lab/ks-manage/prepare-distro-for-ksmanager.sh
    dest: /usr/local/bin/prepare-distro-for-ksmanager
    state: link

################################ EOF ##################################
