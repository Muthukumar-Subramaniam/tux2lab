---
# tasks file for configure_chronyd_service_of_server
#
# Host mode: Drop-in config at /etc/chrony.d/tux2lab.conf (don't touch system config)
# VM mode:   Edit /etc/chrony.conf directly (we own the VM)
#
# NOTE: is_host_mode fact is set by setup_global_vars role

# ====== HOST MODE: Drop-in config ======

- name: Ensure /etc/chrony.d directory exists (host mode)
  become: true
  ansible.builtin.file:
    path: /etc/chrony.d
    state: directory
    mode: '0755'
  when: is_host_mode

- name: Deploy tux2lab chrony drop-in config (host mode)
  become: true
  ansible.builtin.copy:
    dest: /etc/chrony.d/tux2lab.conf
    content: |
      # tux2lab NTP configuration
      pool time.google.com iburst
      bindaddress {{ ansible_facts.env.dnsbinder_server_ipv4_address }}
      bindaddress {{ ansible_facts.env.dnsbinder_server_ipv6_address }}
      allow {{ ansible_facts.env.dnsbinder_network_cidr }}
      allow {{ ansible_facts.env.dnsbinder_ipv6_ula_subnet }}
      local stratum 10
    mode: '0644'
    owner: root
    group: root
  when: is_host_mode

# ====== VM MODE: Edit /etc/chrony.conf directly ======

- name: Comment existing NTP pool from chrony (VM mode)
  become: true
  ansible.builtin.replace:
    path: /etc/chrony.conf
    regexp: '^pool '
    replace: '#pool '
  when: not is_host_mode

- name: Configure custom NTP server with chrony (VM mode)
  become: true
  ansible.builtin.blockinfile:
    marker: "# {mark} ntp-{{ ansible_facts.env.dnsbinder_server_fqdn }}-settings"
    path: /etc/chrony.conf
    block: |
      # Use Google's NTP pool as time source
      pool time.google.com iburst
      # Allow NTP client access from local network.
      bindaddress {{ ansible_facts.env.dnsbinder_server_ipv4_address }}
      bindaddress {{ ansible_facts.env.dnsbinder_server_ipv6_address }}
      allow {{ ansible_facts.env.dnsbinder_network_cidr }}
      allow {{ ansible_facts.env.dnsbinder_ipv6_ula_subnet }}
      # Serve time even if not synchronized to a time source.
      local stratum 10
    insertafter: EOF
    backup: true
  when: not is_host_mode

# ====== COMMON: Restart chronyd ======

- name: Restart chronyd
  become: true
  ansible.builtin.systemd_service:
    name: chronyd
    state: restarted
    enabled: true

############################ EOF #############################
