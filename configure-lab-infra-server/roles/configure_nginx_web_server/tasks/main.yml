---
# tasks file for configure_nginx_web_server
- name: Create directory /tux2lab-data
  become: true
  ansible.builtin.file:
    path: "/tux2lab-data"
    state: directory
    owner: "{{ ansible_facts.env.mgmt_super_user }}"
    group: "{{ ansible_facts.env.mgmt_super_user }}"

- name: Remove default server block from /etc/nginx/nginx.conf
  become: true
  ansible.builtin.shell: |
    sed -i '/include \/etc\/nginx\/conf\.d\/\*\.conf;/,/^}/{ /include \/etc\/nginx\/conf\.d\/\*\.conf;/b; /^}/b; d; }' /etc/nginx/nginx.conf
  args:
    executable: /bin/bash
  changed_when: true

- name: Build SSL certificate Subject Alternative Names
  ansible.builtin.set_fact:
    ssl_san: >-
      DNS:{{ ansible_facts.env.dnsbinder_server_fqdn }},DNS:{{ ansible_facts.env.dnsbinder_server_short_name }},IP:{{ ansible_facts.env.dnsbinder_server_ipv4_address }},IP:{{ ansible_facts.env.dnsbinder_server_ipv6_address }}

- name: Generate self-signed SSL private key
  become: true
  ansible.builtin.command: >
    openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:4096
    -out /etc/pki/tls/private/tux2lab-nginx-selfsigned.key
  args:
    creates: "/etc/pki/tls/private/tux2lab-nginx-selfsigned.key"

- name: Set permissions on SSL private key
  become: true
  ansible.builtin.file:
    path: "/etc/pki/tls/private/tux2lab-nginx-selfsigned.key"
    mode: '0600'

- name: Generate self-signed SSL certificate
  become: true
  ansible.builtin.command: >
    openssl req -new -x509
    -key /etc/pki/tls/private/tux2lab-nginx-selfsigned.key
    -out /etc/pki/tls/certs/tux2lab-nginx-selfsigned.crt
    -days 3650
    -subj "/O={{ ansible_facts.env.dnsbinder_server_fqdn }}/CN={{ ansible_facts.env.dnsbinder_server_fqdn }}"
    -addext "subjectAltName={{ ssl_san }}"
  args:
    creates: "/etc/pki/tls/certs/tux2lab-nginx-selfsigned.crt"

- name: Copy self-signed SSL certificate to system trust anchors
  become: true
  ansible.builtin.copy:
    src: "/etc/pki/tls/certs/tux2lab-nginx-selfsigned.crt"
    dest: "/etc/pki/ca-trust/source/anchors/tux2lab-nginx-selfsigned.crt"
    remote_src: true
    mode: '0644'

- name: Update system CA trust
  become: true
  ansible.builtin.command: update-ca-trust
  changed_when: false

- name: Create custom nginx configuration for {{ ansible_facts.env.dnsbinder_server_fqdn }}
  become: true
  ansible.builtin.template:
    src: custom_nginx_config.j2 
    dest: "/etc/nginx/conf.d/tux2lab.conf"
    mode: '0644'

- name: Restart nginx
  become: true
  ansible.builtin.systemd_service:
    name: nginx
    state: restarted
    enabled: true

############################# EOF ##############################
