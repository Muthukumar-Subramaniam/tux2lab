---
# tasks file for setup_global_vars

# ====== Determine if running in host mode ======
- name: Check if lab_environment_vars exists
  ansible.builtin.stat:
    path: /tux2lab-data/lab_environment_vars
  register: lab_env_vars_file

- name: Read lab_infra_server_mode_is_host from lab_environment_vars
  ansible.builtin.shell: |
    grep -q '^lab_infra_server_mode_is_host=true' /tux2lab-data/lab_environment_vars && echo true || echo false
  register: host_mode_check
  changed_when: false
  when: lab_env_vars_file.stat.exists

- name: Set host mode fact
  ansible.builtin.set_fact:
    is_host_mode: "{{ (lab_env_vars_file.stat.exists and host_mode_check.stdout | default('false') == 'true') | bool }}"

- name: Set PS1 variable for management user
  ansible.builtin.set_fact:
    ps1_variable_mgmt_user: "PS1='[\\[\\033]0;$TITLEPREFIX:\\007\\]\\[\\033[0;32m\\]\\u\\[\\033[0;35m\\]@\\[\\033[0;32m\\]\\h \\[\\033[0;36m\\]\\W\\[\\033[0;33m\\]`__git_ps1`\\[\\033[0m\\]]$ '"

- name: Set PS1 variable for root user
  ansible.builtin.set_fact:
    ps1_variable_root_user: "PS1='[\\[\\033]0;$TITLEPREFIX:\\007\\]\\[\\033[0;31m\\]\\u\\[\\033[0;35m\\]@\\[\\033[0;31m\\]\\h \\[\\033[0;36m\\]\\W\\[\\033[0;33m\\]`__git_ps1`\\[\\033[0m\\]]# '"
