## Debian preseed configuration for tux2lab
## Do not edit this file manually.
## This file is generated by ksmanager utility
## Template location : /tux2lab/ks-manage/ks-templates/debian-13-preseed.cfg
## Time of last update by ksmanager : get_time_of_last_update

### Locale and keyboard
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

### Console (serial)
d-i debian-installer/add-kernel-opts string console=ttyS0,115200n8 nomodeset

### Network — DHCP during install; static IP applied via late_command
### Hostname is set via DHCP and explicitly in late_command (/etc/hostname)
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string get_hostname.get_ipv4_domain
d-i netcfg/get_domain string get_ipv4_domain

### Mirror — use official Debian mirror (netboot-only, no local ISO)
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string
d-i mirror/suite string get_debian_codename

### APT — disable security/updates during install (configured in post-install)
d-i apt-setup/services-select multiselect
d-i apt-setup/enable-source-repositories boolean false

### Clock and timezone
d-i clock-setup/utc boolean true
d-i time/zone string UTC
d-i clock-setup/ntp boolean true
d-i clock-setup/ntp-server string get_lab_infra_server_hostname

### Partitioning — EFI + /boot + / (matches tux2lab standard layout)
d-i partman-auto/method string regular
d-i partman-auto/disk string /dev/get_disk_type_for_the_vm
d-i partman-efi/non_efi_system boolean true
d-i partman/alignment string optimal
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-auto/choose_recipe select custom-tux2lab
d-i partman-auto/expert_recipe string                         \
      custom-tux2lab ::                                       \
              600 600 600 fat32                                \
                      $primary{ }                             \
                      method{ efi }                           \
                      format{ }                               \
              .                                               \
              1024 1024 1024 xfs                               \
                      $primary{ }                             \
                      $bootable{ }                            \
                      method{ format } format{ }              \
                      use_filesystem{ } filesystem{ xfs }     \
                      mountpoint{ /boot }                     \
              .                                               \
              1024 1024 -1 xfs                                 \
                      $primary{ }                             \
                      method{ format } format{ }              \
                      use_filesystem{ } filesystem{ xfs }     \
                      mountpoint{ / }                         \
              .
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true
d-i partman-basicfilesystems/no_swap boolean false

### User setup
d-i passwd/root-login boolean true
d-i passwd/root-password-crypted password get_shadow_password_super_mgmt_user
d-i passwd/user-fullname string get_mgmt_super_user
d-i passwd/username string get_mgmt_super_user
d-i passwd/user-password-crypted password get_shadow_password_super_mgmt_user
d-i passwd/user-default-groups string sudo

### Package selection
tasksel tasksel/first multiselect standard, ssh-server
d-i pkgsel/include string sudo vim bash-completion nfs-common tmux wget tar rsync \
    sysstat tcpdump traceroute netcat-openbsd lsof chrony dnsutils kexec-tools \
    less cloud-guest-utils curl resolvconf
d-i pkgsel/upgrade select full-upgrade
popularity-contest popularity-contest/participate boolean false

### GRUB bootloader
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string /dev/get_disk_type_for_the_vm

### Late commands — network setup, serial console, post-install
d-i preseed/late_command string \
    mkdir -p /target/etc/systemd/network; \
    V_count=0; for v_interface in $(ls /sys/class/net | grep -v lo); do \
        printf '[Match]\nMACAddress=%s\n\n[Link]\nName=eth%s\n' \
            "$(ip link show "$v_interface" | awk '/link\/ether/{print $2}')" "$V_count" \
            > /target/etc/systemd/network/7${V_count}-eth${V_count}.link; \
        V_count=$((V_count+1)); \
    done; \
    echo 'get_hostname.get_ipv4_domain' > /target/etc/hostname; \
    printf 'auto lo\niface lo inet loopback\n\nauto eth0\niface eth0 inet static\n    address get_ipv4_address/get_ipv4_prefix\n    gateway get_ipv4_gateway\n    dns-nameservers get_ipv4_nameserver\n    dns-search get_ipv4_domain\n' > /target/etc/network/interfaces; \
    if echo "get_ipv6_address" | grep -q ':'; then \
        printf '\niface eth0 inet6 static\n    address get_ipv6_address/get_ipv6_prefix\n' >> /target/etc/network/interfaces; \
    fi; \
    sed -i 's/^GRUB_CMDLINE_LINUX_DEFAULT=.*/GRUB_CMDLINE_LINUX_DEFAULT="console=ttyS0,115200n8 nomodeset"/' /target/etc/default/grub; \
    in-target update-grub; \
    date '+%Y-%m-%d %H:%M:%S %Z' > /target/etc/bigbang; \
    in-target bash -c 'curl -sf http://get_lab_infra_server_hostname/ksmanager-hub/kickstarts/get_hostname.get_ipv4_domain/post-install.sh -o /root/tux2lab-post-install.sh && chmod 700 /root/tux2lab-post-install.sh && /root/tux2lab-post-install.sh'

### Reboot after installation
d-i finish-install/reboot_in_progress note
