#!/usr/bin/env bash
# Centralized distribution version configuration
# This file defines version-based mappings for all supported distributions
#----------------------------------------------------------------------------------------#
# If you encounter any issues with this script, or have suggestions or feature requests, #
# please open an issue at: https://github.com/Muthukumar-Subramaniam/tux2lab/issues      #
#----------------------------------------------------------------------------------------#

# Available versions per distro (newest first — first entry is the default)
declare -A DISTRO_AVAILABLE_VERSIONS=(
    ["almalinux"]="10 9"
    ["rocky"]="10 9"
    ["oraclelinux"]="10 9"
    ["centos-stream"]="10 9"
    ["rhel"]="10 9"
    ["ubuntu-lts"]="24.04 22.04"
    ["opensuse-leap"]="15.6 15.5"
)

# Display names for interactive menus
declare -A DISTRO_DISPLAY_NAMES=(
    ["almalinux"]="AlmaLinux"
    ["rocky"]="Rocky Linux"
    ["oraclelinux"]="OracleLinux"
    ["centos-stream"]="CentOS Stream"
    ["rhel"]="Red Hat Enterprise Linux"
    ["ubuntu-lts"]="Ubuntu Server LTS"
    ["opensuse-leap"]="openSUSE Leap"
)

# ISO URLs keyed by "distro:version"
# Note: RHEL URLs are placeholders - actual download requires Red Hat Developer subscription login
declare -A ISO_URLS=(
    ["almalinux:10"]="https://repo.almalinux.org/almalinux/10/isos/x86_64/AlmaLinux-10-latest-x86_64-dvd.iso"
    ["almalinux:9"]="https://repo.almalinux.org/almalinux/9/isos/x86_64/AlmaLinux-9-latest-x86_64-dvd.iso"
    ["rocky:10"]="https://dl.rockylinux.org/pub/rocky/10/isos/x86_64/Rocky-10-latest-x86_64-dvd.iso"
    ["rocky:9"]="https://dl.rockylinux.org/pub/rocky/9/isos/x86_64/Rocky-9-latest-x86_64-dvd.iso"
    ["oraclelinux:10"]="https://yum.oracle.com/ISOS/OracleLinux/OL10/u1/x86_64/OracleLinux-R10-U1-x86_64-dvd.iso"
    ["oraclelinux:9"]="https://yum.oracle.com/ISOS/OracleLinux/OL9/u7/x86_64/OracleLinux-R9-U7-x86_64-dvd.iso"
    ["centos-stream:10"]="https://mirror.stream.centos.org/10-stream/BaseOS/x86_64/iso/CentOS-Stream-10-latest-x86_64-dvd1.iso"
    ["centos-stream:9"]="https://mirror.stream.centos.org/9-stream/BaseOS/x86_64/iso/CentOS-Stream-9-latest-x86_64-dvd1.iso"
    ["rhel:10"]="https://developers.redhat.com/content-gateway/file/rhel-10-latest-x86_64-dvd.iso"
    ["rhel:9"]="https://developers.redhat.com/content-gateway/file/rhel-9-latest-x86_64-dvd.iso"
    ["ubuntu-lts:24.04"]="https://releases.ubuntu.com/24.04/ubuntu-24.04.4-live-server-amd64.iso"
    ["ubuntu-lts:22.04"]="https://releases.ubuntu.com/22.04/ubuntu-22.04.5-live-server-amd64.iso"
    ["opensuse-leap:15.6"]="https://download.opensuse.org/distribution/leap/15.6/iso/openSUSE-Leap-15.6-DVD-x86_64-Media.iso"
    ["opensuse-leap:15.5"]="https://download.opensuse.org/distribution/leap/15.5/iso/openSUSE-Leap-15.5-DVD-x86_64-Media.iso"
)

# ISO filenames keyed by "distro:version"
declare -A ISO_FILENAMES=(
    ["almalinux:10"]="AlmaLinux-10-latest-x86_64-dvd.iso"
    ["almalinux:9"]="AlmaLinux-9-latest-x86_64-dvd.iso"
    ["rocky:10"]="Rocky-10-latest-x86_64-dvd.iso"
    ["rocky:9"]="Rocky-9-latest-x86_64-dvd.iso"
    ["oraclelinux:10"]="OracleLinux-R10-latest-x86_64-dvd.iso"
    ["oraclelinux:9"]="OracleLinux-R9-latest-x86_64-dvd.iso"
    ["centos-stream:10"]="CentOS-Stream-10-latest-x86_64-dvd1.iso"
    ["centos-stream:9"]="CentOS-Stream-9-latest-x86_64-dvd1.iso"
    ["rhel:10"]="rhel-10-latest-x86_64-dvd.iso"
    ["rhel:9"]="rhel-9-latest-x86_64-dvd.iso"
    ["ubuntu-lts:24.04"]="ubuntu-24.04-latest-live-server-amd64.iso"
    ["ubuntu-lts:22.04"]="ubuntu-22.04-latest-live-server-amd64.iso"
    ["opensuse-leap:15.6"]="openSUSE-Leap-15.6-DVD-x86_64-Media.iso"
    ["opensuse-leap:15.5"]="openSUSE-Leap-15.5-DVD-x86_64-Media.iso"
)

# Kickstart template filenames keyed by "distro_family:version"
# Red Hat-based distros share templates, so they use the "redhat-based" family key
declare -A KS_TEMPLATES=(
    ["redhat-based:10"]="redhat-based-10-ks.cfg"
    ["redhat-based:9"]="redhat-based-9-ks.cfg"
    ["ubuntu-lts:24.04"]="ubuntu-lts-24.04-ks"
    ["ubuntu-lts:22.04"]="ubuntu-lts-22.04-ks"
    ["opensuse-leap:15.6"]="opensuse-leap-15.6-autoinst.xml"
    ["opensuse-leap:15.5"]="opensuse-leap-15.5-autoinst.xml"
)

# iPXE template filenames keyed by distro family
declare -A IPXE_TEMPLATES=(
    ["redhat-based"]="ipxe-template-redhat-based.ipxe"
    ["ubuntu-lts"]="ipxe-template-ubuntu-lts.ipxe"
    ["opensuse-leap"]="ipxe-template-opensuse-leap.ipxe"
)

# Get the default (newest) version for a distro
fn_get_default_version() {
    local distro_base="$1"
    local versions="${DISTRO_AVAILABLE_VERSIONS[$distro_base]}"
    echo "${versions%% *}"
}

# Get all available versions for a distro as an array
fn_get_available_versions() {
    local distro_base="$1"
    echo "${DISTRO_AVAILABLE_VERSIONS[$distro_base]}"
}

# Validate that a version is available for a distro
fn_is_valid_version() {
    local distro_base="$1"
    local version="$2"
    local versions="${DISTRO_AVAILABLE_VERSIONS[$distro_base]}"
    [[ " $versions " == *" $version "* ]]
}

# Get the distro family (for template selection)
fn_get_distro_family() {
    local distro_base="$1"
    case "$distro_base" in
        almalinux|rocky|oraclelinux|centos-stream|rhel)
            echo "redhat-based"
            ;;
        *)
            echo "$distro_base"
            ;;
    esac
}

# Get display name with version
fn_get_full_display_name() {
    local distro_base="$1"
    local version="$2"
    echo "${DISTRO_DISPLAY_NAMES[$distro_base]} $version"
}
