#!/usr/bin/env bash
# Centralized distribution version configuration
# This file defines version-based mappings for all supported distributions
#----------------------------------------------------------------------------------------#
# If you encounter any issues with this script, or have suggestions or feature requests, #
# please open an issue at: https://github.com/Muthukumar-Subramaniam/tux2lab/issues      #
#----------------------------------------------------------------------------------------#

# Guard against multiple sourcing (readonly variables cannot be re-declared)
[[ -n "${_DISTRO_VERSIONS_CONF_LOADED:-}" ]] && return 0 2>/dev/null || true
_DISTRO_VERSIONS_CONF_LOADED=1

# Available versions per distro (newest first)
# To add version 8 support for guest VMs, add entries here and provide a matching kickstart template
declare -A DISTRO_AVAILABLE_VERSIONS=(
    ["almalinux"]="10 9 8"
    ["rocky"]="10 9 8"
    ["oraclelinux"]="10 9 8"
    ["centos-stream"]="10 9 8"
    ["rhel"]="10 9 8"
    ["ubuntu-lts"]="26.04 24.04 22.04"
    ["debian"]="13 12 11"
    ["opensuse-leap"]="16.0 15.6"
)

# Display names for interactive menus
declare -A DISTRO_DISPLAY_NAMES=(
    ["almalinux"]="AlmaLinux"
    ["rocky"]="Rocky Linux"
    ["oraclelinux"]="OracleLinux"
    ["centos-stream"]="CentOS Stream"
    ["rhel"]="Red Hat Enterprise Linux"
    ["ubuntu-lts"]="Ubuntu Server LTS"
    ["debian"]="Debian"
    ["opensuse-leap"]="openSUSE Leap"
)

# ISO URLs keyed by "distro:version"
# v2.0.0: Boot ISOs only (~1GB) — packages install from internet repos (REPO_URLS)
# Note: RHEL requires a subscription — no public download URL.
# Note: Ubuntu uses full live-server ISO (needed for NFS casper root with 2GB RAM)
# Note: Debian uses netboot-only PXE install (no ISO)
declare -A ISO_URLS=(
    ["almalinux:10"]="https://repo.almalinux.org/almalinux/10/isos/x86_64/AlmaLinux-10-latest-x86_64-boot.iso"
    ["almalinux:9"]="https://repo.almalinux.org/almalinux/9/isos/x86_64/AlmaLinux-9-latest-x86_64-boot.iso"
    ["almalinux:8"]="https://repo.almalinux.org/almalinux/8/isos/x86_64/AlmaLinux-8-latest-x86_64-boot.iso"
    ["rocky:10"]="https://dl.rockylinux.org/pub/rocky/10/isos/x86_64/Rocky-10-latest-x86_64-boot.iso"
    ["rocky:9"]="https://dl.rockylinux.org/pub/rocky/9/isos/x86_64/Rocky-9-latest-x86_64-boot.iso"
    ["rocky:8"]="https://dl.rockylinux.org/pub/rocky/8/isos/x86_64/Rocky-8-latest-x86_64-boot.iso"
    ["oraclelinux:10"]="https://yum.oracle.com/ISOS/OracleLinux/OL10/u2/x86_64/OracleLinux-R10-U2-x86_64-boot.iso"
    ["oraclelinux:9"]="https://yum.oracle.com/ISOS/OracleLinux/OL9/u8/x86_64/OracleLinux-R9-U8-x86_64-boot.iso"
    ["oraclelinux:8"]="https://yum.oracle.com/ISOS/OracleLinux/OL8/u10/x86_64/OracleLinux-R8-U10-x86_64-boot.iso"
    ["centos-stream:10"]="https://mirror.stream.centos.org/10-stream/BaseOS/x86_64/iso/CentOS-Stream-10-latest-x86_64-boot.iso"
    ["centos-stream:9"]="https://mirror.stream.centos.org/9-stream/BaseOS/x86_64/iso/CentOS-Stream-9-latest-x86_64-boot.iso"
    ["centos-stream:8"]="https://vault.centos.org/8-stream/isos/x86_64/CentOS-Stream-8-20240603.0-x86_64-boot.iso"
    ["ubuntu-lts:26.04"]="https://releases.ubuntu.com/26.04/"
    ["ubuntu-lts:24.04"]="https://releases.ubuntu.com/24.04/"
    ["ubuntu-lts:22.04"]="https://releases.ubuntu.com/22.04/"
    # Debian uses netboot-only PXE install (no ISO) — packages come from deb.debian.org
    ["opensuse-leap:15.6"]="https://download.opensuse.org/distribution/leap/15.6/iso/openSUSE-Leap-15.6-NET-x86_64-Media.iso"
    ["opensuse-leap:16.0"]="https://download.opensuse.org/distribution/leap/16.0/offline/Leap-16.0-online-installer-x86_64-Build178.27.install.iso"
)

# Checksum URLs keyed by "distro:version"
# Each distro publishes checksums differently — these point to the SHA256 checksum files
declare -A CHECKSUM_URLS=(
    ["almalinux:10"]="https://repo.almalinux.org/almalinux/10/isos/x86_64/CHECKSUM"
    ["almalinux:9"]="https://repo.almalinux.org/almalinux/9/isos/x86_64/CHECKSUM"
    ["rocky:10"]="https://dl.rockylinux.org/pub/rocky/10/isos/x86_64/CHECKSUM"
    ["rocky:9"]="https://dl.rockylinux.org/pub/rocky/9/isos/x86_64/CHECKSUM"
    ["oraclelinux:10"]="https://linux.oracle.com/security/gpg/checksum/OracleLinux-R10-U2-Server-x86_64.checksum"
    ["oraclelinux:9"]="https://linux.oracle.com/security/gpg/checksum/OracleLinux-R9-U8-Server-x86_64.checksum"
    ["centos-stream:10"]="https://mirror.stream.centos.org/10-stream/BaseOS/x86_64/iso/SHA256SUM"
    ["centos-stream:9"]="https://mirror.stream.centos.org/9-stream/BaseOS/x86_64/iso/SHA256SUM"
    ["almalinux:8"]="https://repo.almalinux.org/almalinux/8/isos/x86_64/CHECKSUM"
    ["rocky:8"]="https://dl.rockylinux.org/pub/rocky/8/isos/x86_64/Rocky-8-latest-x86_64-boot.iso.CHECKSUM"
    ["oraclelinux:8"]="https://linux.oracle.com/security/gpg/checksum/OracleLinux-R8-U10-Server-x86_64.checksum"
    ["centos-stream:8"]="https://vault.centos.org/8-stream/isos/x86_64/CHECKSUM"
    ["ubuntu-lts:26.04"]="https://releases.ubuntu.com/26.04/SHA256SUMS"
    ["ubuntu-lts:24.04"]="https://releases.ubuntu.com/24.04/SHA256SUMS"
    ["ubuntu-lts:22.04"]="https://releases.ubuntu.com/22.04/SHA256SUMS"
    # Debian: no ISO checksums needed (netboot-only)
    ["opensuse-leap:15.6"]="https://download.opensuse.org/distribution/leap/15.6/iso/openSUSE-Leap-15.6-NET-x86_64-Media.iso.sha256"
    ["opensuse-leap:16.0"]="https://download.opensuse.org/distribution/leap/16.0/offline/Leap-16.0-online-installer-x86_64-Build178.27.install.iso.sha512"
)

# ISO filenames keyed by "distro:version"
declare -A ISO_FILENAMES=(
    ["almalinux:10"]="AlmaLinux-10-latest-x86_64-boot.iso"
    ["almalinux:9"]="AlmaLinux-9-latest-x86_64-boot.iso"
    ["almalinux:8"]="AlmaLinux-8-latest-x86_64-boot.iso"
    ["rocky:10"]="Rocky-10-latest-x86_64-boot.iso"
    ["rocky:9"]="Rocky-9-latest-x86_64-boot.iso"
    ["rocky:8"]="Rocky-8-latest-x86_64-boot.iso"
    ["oraclelinux:10"]="OracleLinux-R10-latest-x86_64-boot.iso"
    ["oraclelinux:9"]="OracleLinux-R9-latest-x86_64-boot.iso"
    ["oraclelinux:8"]="OracleLinux-R8-latest-x86_64-boot.iso"
    ["centos-stream:10"]="CentOS-Stream-10-latest-x86_64-boot.iso"
    ["centos-stream:9"]="CentOS-Stream-9-latest-x86_64-boot.iso"
    ["centos-stream:8"]="CentOS-Stream-8-latest-x86_64-boot.iso"
    ["rhel:10"]="rhel-10-latest-x86_64-boot.iso"
    ["rhel:9"]="rhel-9-latest-x86_64-boot.iso"
    ["rhel:8"]="rhel-8-latest-x86_64-boot.iso"
    ["ubuntu-lts:26.04"]="ubuntu-26.04-latest-live-server-amd64.iso"
    ["ubuntu-lts:24.04"]="ubuntu-24.04-latest-live-server-amd64.iso"
    ["ubuntu-lts:22.04"]="ubuntu-22.04-latest-live-server-amd64.iso"
    # Debian: no ISO filenames (netboot-only, files managed by distro setup)
    ["opensuse-leap:15.6"]="openSUSE-Leap-15.6-NET-x86_64-Media.iso"
    ["opensuse-leap:16.0"]="Leap-16.0-online-installer-x86_64.install.iso"
)

# Kickstart template filenames keyed by "distro_family:version"
# Red Hat-based distros share templates, so they use the "redhat-based" family key
declare -A KS_TEMPLATES=(
    ["redhat-based:10"]="redhat-based-10-ks.cfg"
    ["redhat-based:9"]="redhat-based-9-ks.cfg"
    ["redhat-based:8"]="redhat-based-8-ks.cfg"
    ["ubuntu-lts:26.04"]="ubuntu-lts-26.04-ks"
    ["ubuntu-lts:24.04"]="ubuntu-lts-24.04-ks"
    ["ubuntu-lts:22.04"]="ubuntu-lts-22.04-ks"
    ["debian:13"]="debian-13-preseed.cfg"
    ["debian:12"]="debian-12-preseed.cfg"
    ["debian:11"]="debian-11-preseed.cfg"
    ["opensuse-leap:15.6"]="opensuse-leap-15.6-autoinst.xml"
    ["opensuse-leap:16.0"]="opensuse-leap-16.0-profile.json"
)

# iPXE template filenames keyed by distro family
# Version-specific overrides use "distro:major_version" keys (e.g., opensuse-leap:16)
declare -A IPXE_TEMPLATES=(
    ["redhat-based"]="ipxe-template-redhat-based.ipxe"
    ["ubuntu-lts"]="ipxe-template-ubuntu-lts.ipxe"
    ["debian"]="ipxe-template-debian.ipxe"
    ["opensuse-leap"]="ipxe-template-opensuse-leap.ipxe"
    ["opensuse-leap:16"]="ipxe-template-opensuse-leap-16.ipxe"
)

# Ordered list of distro keys (derived from DISTRO_AVAILABLE_VERSIONS)
readonly DISTRO_KEYS=("almalinux" "rocky" "oraclelinux" "centos-stream" "rhel" "ubuntu-lts" "debian" "opensuse-leap")

# Ubuntu version-to-codename mapping (used for APT sources configuration)
declare -A UBUNTU_CODENAMES=(
    ["22.04"]="jammy"
    ["24.04"]="noble"
    ["26.04"]="resolute"
)

# Debian version-to-codename mapping (used for APT sources and mirror configuration)
declare -A DEBIAN_CODENAMES=(
    ["11"]="bullseye"
    ["12"]="bookworm"
    ["13"]="trixie"
)

# RHEL-based distros
readonly RHEL_BASED_DISTROS=("almalinux" "rocky" "oraclelinux" "centos-stream" "rhel")

# Online package repository URLs keyed by "distro:version"
# Used in kickstart templates (url --url=) for package installation from internet
# RHEL uses rhsm (subscription manager) instead — no public repo URL
declare -A REPO_URLS=(
    ["almalinux:10"]="https://repo.almalinux.org/almalinux/10/BaseOS/x86_64/os/"
    ["almalinux:9"]="https://repo.almalinux.org/almalinux/9/BaseOS/x86_64/os/"
    ["almalinux:8"]="https://repo.almalinux.org/almalinux/8/BaseOS/x86_64/os/"
    ["rocky:10"]="https://dl.rockylinux.org/pub/rocky/10/BaseOS/x86_64/os/"
    ["rocky:9"]="https://dl.rockylinux.org/pub/rocky/9/BaseOS/x86_64/os/"
    ["rocky:8"]="https://dl.rockylinux.org/pub/rocky/8/BaseOS/x86_64/os/"
    ["oraclelinux:10"]="https://yum.oracle.com/repo/OracleLinux/OL10/baseos/latest/x86_64/"
    ["oraclelinux:9"]="https://yum.oracle.com/repo/OracleLinux/OL9/baseos/latest/x86_64/"
    ["oraclelinux:8"]="https://yum.oracle.com/repo/OracleLinux/OL8/baseos/latest/x86_64/"
    ["centos-stream:10"]="https://mirror.stream.centos.org/10-stream/BaseOS/x86_64/os/"
    ["centos-stream:9"]="https://mirror.stream.centos.org/9-stream/BaseOS/x86_64/os/"
    ["centos-stream:8"]="https://vault.centos.org/8-stream/BaseOS/x86_64/os/"
    ["opensuse-leap:15.6"]="https://download.opensuse.org/distribution/leap/15.6/repo/oss/"
)

# AppStream repository URLs keyed by "distro:version"
# RHEL-based installs need AppStream for packages beyond core (e.g., vim, tmux, python3-pip)
# Added as `repo --name=appstream` in kickstart templates alongside the BaseOS `url --url=`
declare -A APPSTREAM_REPO_URLS=(
    ["almalinux:10"]="https://repo.almalinux.org/almalinux/10/AppStream/x86_64/os/"
    ["almalinux:9"]="https://repo.almalinux.org/almalinux/9/AppStream/x86_64/os/"
    ["almalinux:8"]="https://repo.almalinux.org/almalinux/8/AppStream/x86_64/os/"
    ["rocky:10"]="https://dl.rockylinux.org/pub/rocky/10/AppStream/x86_64/os/"
    ["rocky:9"]="https://dl.rockylinux.org/pub/rocky/9/AppStream/x86_64/os/"
    ["rocky:8"]="https://dl.rockylinux.org/pub/rocky/8/AppStream/x86_64/os/"
    ["oraclelinux:10"]="https://yum.oracle.com/repo/OracleLinux/OL10/appstream/x86_64/"
    ["oraclelinux:9"]="https://yum.oracle.com/repo/OracleLinux/OL9/appstream/x86_64/"
    ["oraclelinux:8"]="https://yum.oracle.com/repo/OracleLinux/OL8/appstream/x86_64/"
    ["centos-stream:10"]="https://mirror.stream.centos.org/10-stream/AppStream/x86_64/os/"
    ["centos-stream:9"]="https://mirror.stream.centos.org/9-stream/AppStream/x86_64/os/"
    ["centos-stream:8"]="https://vault.centos.org/8-stream/AppStream/x86_64/os/"
)

# Validate that a version is available for a distro
fn_is_valid_version() {
    local distro_base="$1"
    local version="$2"
    local versions="${DISTRO_AVAILABLE_VERSIONS[$distro_base]}"
    [[ " $versions " == *" $version "* ]]
}

# Get the distro family (for template selection)
fn_get_distro_family() {
    local distro_base="$1"
    case "$distro_base" in
        almalinux|rocky|oraclelinux|centos-stream|rhel)
            echo "redhat-based"
            ;;
        *)
            echo "$distro_base"
            ;;
    esac
}
